name: "Go Backend with Docker"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Test & Build"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run Tests
        run: go test ./...

      - name: Build Binary
        run: go build -o bin/app main.go

  docker:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Image
        run: docker build -t myapp:latest .

      - name: Smoke Test
        run: docker run --rm myapp:latest echo "Container OK"
