name: "Full Stack — Go API + React UI"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: "API Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run Go Tests
        run: go test ./... -race

      - name: Build API Binary
        run: go build -o bin/api main.go

  ui:
    name: "UI Build"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install
        working-directory: ui
        run: npm ci

      - name: Build
        working-directory: ui
        run: npm run build

  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    needs: [api, ui]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy (placeholder)
        run: echo "Both API and UI passed — ready to deploy!"
