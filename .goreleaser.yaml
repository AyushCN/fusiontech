# yaml-anchor build metadata injected by GoReleaser
# https://goreleaser.com/customization/builds/

version: 2

project_name: anchor

before:
  hooks:
    - go mod tidy

builds:
  - id: anchor
    dir: yaml-anchor
    main: ./main.go
    binary: anchor
    ldflags:
      - -s -w
      - -X yaml-anchor/cmd.version={{.Version}}
      - -X yaml-anchor/cmd.commit={{.Commit}}
      - -X yaml-anchor/cmd.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: anchor
    builds: [anchor]
    name_template: "anchor_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - yaml-anchor/SETUP.md
      - yaml-anchor/API_DOCS.md

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: AyushCN
    name: fusiontech
  name_template: "v{{.Version}}"
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
